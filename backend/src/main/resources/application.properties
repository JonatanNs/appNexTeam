spring.application.name=nexTeam

#spring.datasource.url=jdbc:postgresql://localhost:5432/nexteam
#spring.datasource.username=${DB_USERNAME}
#spring.datasource.password=${DB_PASSWORD}
#spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.url=jdbc:mysql://localhost:3306/nexteam
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# permet à Hibernate de regrouper ces accès en lots, avec WHERE id IN (...), par packet de 20.
spring.jpa.properties.hibernate.default_batch_fetch_size=20